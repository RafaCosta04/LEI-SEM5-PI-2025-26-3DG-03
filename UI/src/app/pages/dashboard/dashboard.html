<div class="dashboard-grid">

  <!-- 1 — Preview 3D -->
  <div class="card card-preview" (click)="goToVisualization()" tabindex="0">
    <iframe src="/v" class="preview-frame" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    <div class="preview-overlay">{{ 'DASHBOARD.OPEN_3D' | translate }}</div>
  </div>

  <!-- 2 — Calendário -->
  <div class="card card-calendar">
    <div class="calendar-header">
      <button class="nav-btn" (click)="prevMonth()">◀</button>
      <div class="calendar-title">{{ monthName() }} {{ year }}</div>
      <button class="nav-btn" (click)="nextMonth()">▶</button>
    </div>

    <div class="calendar-grid">
      <div class="weekday" *ngFor="let w of ['DASHBOARD.CALENDAR.SUN','DASHBOARD.CALENDAR.MON','DASHBOARD.CALENDAR.TUE','DASHBOARD.CALENDAR.WED','DASHBOARD.CALENDAR.THU','DASHBOARD.CALENDAR.FRI','DASHBOARD.CALENDAR.SAT']">{{ w | translate }}</div>

      <ng-container *ngFor="let week of weeks">
        <div class="day" *ngFor="let day of week">{{ day || '' }}</div>
      </ng-container>
    </div>
  </div>


</div>
